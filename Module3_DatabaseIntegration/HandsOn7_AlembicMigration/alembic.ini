# A generic, single database configuration for Alembic.

[alembic]
# Path to migration environment script
script_location = alembic

# Logging template
file_template = %%(rev)s_%%(slug)s

# Target Database URL (SQLite default for zero-config execution)
sqlalchemy.url = sqlite:///./college_db_orm.db

[post_write_hooks]

[logging]
default_handler = console

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
